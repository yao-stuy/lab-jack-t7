# Build the module for linux/arm64 + linux/amd64 in Viam's cloud build infra and
# publish it to the registry whenever you push a semver tag
# (e.g. `git tag v0.1.0 && git push --tags`).
# After this runs, any machine configured with this module pulls the new version
# automatically.
#
# See https://github.com/viamrobotics/build-action for details.
on:
  push:
    tags:
      # we support 0.0.1, v0.0.1, 0.0.1-rc1, v0.0.1-rc1
      - "v?[0-9]+.[0-9]+.[0-9]+"
      - "v?[0-9]+.[0-9]+.[0-9]+-rc[0-9]+"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: viamrobotics/build-action@v1
        with:
          version: ${{ github.ref_name }}
          ref: ${{ github.sha }}
          key-id: ${{ secrets.viam_key_id }}
          key-value: ${{ secrets.viam_key_value }}
          token: ${{ github.token }} # only required for private git repos
